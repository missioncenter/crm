{% extends "projects/base.html" %}
{% block content %}
<h1>Delete Project</h1>
<p>Are you sure you want to delete project "{{ project.title }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirm delete</button>
    <a href="{% url 'project_list' %}">Cancel</a>
</form>
{% endblock %}

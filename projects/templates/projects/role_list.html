{% extends "projects/base.html" %}
{% block content %}
<h1>Roles</h1>
<div class="page-actions">
    <a class="button" href="{% url 'role_create' %}">Create Role</a>
</div>
<table class="table-list">
    <thead>
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Users</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for role in roles %}
        <tr>
            <td>{{ role.name }}</td>
            <td>{{ role.description|default:'—' }}</td>
            <td>{{ role.users.count }}</td>
            <td>
                <a href="{% url 'role_update' role.pk %}">Edit</a>
                <a href="{% url 'role_delete' role.pk %}">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No roles available.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}

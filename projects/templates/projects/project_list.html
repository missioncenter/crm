{% extends "projects/base.html" %}
{% block content %}
<h1>Projects</h1>
<div class="page-actions">
    <a class="button" href="{% url 'project_create' %}">Create Project</a>
</div>
<table class="table-list">
    <thead>
        <tr>
            <th>Title</th>
            <th>Owner</th>
            <th>Members</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for project in projects %}
        <tr>
            <td>{{ project.title }}</td>
            <td>{{ project.owner.username }}</td>
            <td>{{ project.members.count }}</td>
            <td>
                <a href="{% url 'project_update' project.pk %}">Edit</a>
                <a href="{% url 'project_delete' project.pk %}">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No projects available.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}

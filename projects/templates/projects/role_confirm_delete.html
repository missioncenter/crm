{% extends "projects/base.html" %}
{% block page_header %}
<div class="page-header">
    <h1>Delete Role</h1>
</div>
{% endblock %}
{% block content %}
<div class="confirm-page">
    <div class="confirm-card">
        <h1>Delete Role</h1>
        <p>Are you sure you want to delete role "{{ role.name }}"?</p>
        <form method="post" class="confirm-actions">
            {% csrf_token %}
            <button type="submit" class="button danger">Confirm delete</button>
            <a class="button secondary" href="{% url 'role_list' %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

{% extends "projects/base.html" %}
{% block content %}
<h1>Delete Role</h1>
<p>Are you sure you want to delete role "{{ role.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirm delete</button>
    <a href="{% url 'role_list' %}">Cancel</a>
</form>
{% endblock %}

{% extends "projects/base.html" %}
{% block content %}
<h1>Delete Task</h1>
<p>Are you sure you want to delete task "{{ task.title }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirm delete</button>
    <a href="{% url 'task_list' %}">Cancel</a>
</form>
{% endblock %}

{% extends "projects/base.html" %}
{% block page_header %}
<div class="page-header">
    <h1 style="color: var(--md-error);">403 — Access Denied</h1>
</div>
{% endblock %}
{% block content %}
<div class="forbidden-page">
    <div class="forbidden-card">
        <div class="forbidden-icon">403</div>
        <h2 class="forbidden-title">Access Denied</h2>
        <p class="forbidden-message">{{ message }}</p>
        <div class="forbidden-actions">
            <a class="button secondary" href="javascript:history.back()">Go Back</a>
            <a class="button" href="{% url 'home' %}">Feed</a>
        </div>
    </div>
</div>
{% endblock %}

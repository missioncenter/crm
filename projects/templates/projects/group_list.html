{% extends "projects/base.html" %}
{% block page_header %}
<div class="page-header">
    <h1>Groups</h1>
    <div class="page-actions">
        <a class="button" href="{% url 'group_create' %}">Create Group</a>
    </div>
</div>
{% endblock %}
{% block content %}
<div class="table-wrap">
<table class="table-list">
    <thead>
        <tr>
            <th>Name</th>
            <th>Users</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for group in groups %}
        <tr>
            <td>{{ group.name }}</td>
            <td>{{ group.user_set.count }}</td>
            <td>
                <a href="{% url 'group_update' group.pk %}">Edit</a>
                <a href="{% url 'group_delete' group.pk %}">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No groups available.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% endblock %}

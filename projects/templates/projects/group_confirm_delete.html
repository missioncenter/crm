{% extends "projects/base.html" %}
{% block content %}
<h1>Delete Group</h1>
<p>Are you sure you want to delete group "{{ group.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirm delete</button>
    <a href="{% url 'group_list' %}">Cancel</a>
</form>
{% endblock %}

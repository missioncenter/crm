<div class="task-progress-widget{% if compact %} task-progress-widget--compact{% endif %}" data-task-progress-widget data-progress="{{ progress }}">
    <div class="task-progress-track">
        <div class="task-progress-fill" data-task-progress-fill style="width: {{ progress }}%;"></div>
    </div>
    <div class="task-progress-row">
        <span class="task-progress-inline-value">{{ progress }}%</span>
    </div>
</div>

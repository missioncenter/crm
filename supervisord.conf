[supervisord]
nodaemon=true

[program:gunicorn]
command=/usr/local/bin/gunicorn crm_local.wsgi:application --bind 127.0.0.1:8000 --workers 3 --threads 2 --log-level=info
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:nginx]
command=/usr/sbin/nginx -g 'daemon off;'
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
